
# Pre-start gpg-agent so parallel shells don't race to start it
launch /run/current-system/sw/bin/zsh --login -c "gpgconf --launch gpg-agent 2>/dev/null; sleep 0.5 && kitty @ close-os-window --self"

#
# Dotfiles

new_os_window
os_window_title Dot
# os_window_class mywindow
os_window_name dotfiles
os_window_state normal

# Dot

new_tab  dot
layout splits

