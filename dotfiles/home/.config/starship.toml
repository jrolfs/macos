[fill]
symbol = " "
style = ""

#
# ---------- General ----------------------------------------

[character]
success_symbol = "[‚Üí](green)"
error_symbol = "[√ó](red)"

vimcmd_symbol = "[¬∑](green)"
# vimcmd_visual_symbol = "[‚äô](green)"
# vimcmd_replace_symbol = "[‚äö](green)"
# vimcmd_replace_one_symbol = "[‚äö](green)"


[directory]
disabled = true
truncation_length = 3
truncation_symbol = "‚Ä¶/"
truncate_to_repo = true
read_only = " Ôëñ"

[cmd_duration]
format = " took [$duration]($style)"


#
# ---------- Context ---------------------------------------

[custom.directory]
command = "$XDG_CONFIG_HOME/starship/directory.zsh"
when = true
format = "[$output](cyan bold) "
shell = ["zsh", "--no-rcs"]

[custom.pinentry]
command = "$XDG_CONFIG_HOME/starship/pinentry.sh"
shell = ["/run/current-system/sw/bin/zsh"]
format = "[$output](yellow)"
when = true
style = ""

[custom.pair]
command = "$XDG_CONFIG_HOME/starship/pair-status.sh"
shell = ["/run/current-system/sw/bin/zsh"]
when = "$XDG_CONFIG_HOME/starship/is-pairing.sh"
format = "[$symbol($output)]($style) [Ôäæ ](purple) ¬∑"
style = ""

[git_branch]
style = "purple"
symbol = "Ôêò "
truncation_length = 30
format = "on [$symbol$branch]($style) "

[git_state]
format = '[$state( $progress_current/$progress_total)]($style) '
cherry_pick = "[üçí picking](bold red)"
rebase = "[‚Üë rebasing](bold yellow)"
merge = "[‚Üí merging](bold cyan)"
bisect = "[‚Üï bisecting](bold yellow)"
style = "yellow"

[git_status]
format = '([[$modified$conflicted$deleted$renamed$staged$untracked$stashed $ahead_behind](bold red)]($style) )'
style = "red"
ahead = "‚Üë"
behind = "‚Üì"
conflicted = "‚âÝ"
deleted = "√ó"
diverged = "‚Üï"
modified = "¬∑"
renamed = "¬ª"
staged = "+"
stashed = "‚öë"
untracked = "?"
# up_to_date = "‚úî"

[package]
disabled = true

[gcloud]
disabled = true
format = ' [$symbol$account(@$domain)(\($project\))]($style)'

[kubernetes]
# format = 'on [‚õµ ($user on )($cluster in )$context \($namespace\)](dimmed green) '
format = ' [Û±Éæ $context ¬ª [$namespace](bold)](blue)'
disabled = false
[kubernetes.context_aliases]
# Production
'.*app02-prod.*' = 'production'
'.*arg01-prod .*' = 'production:arg'
'.*shared02-prod.*' = 'production:shared'

# Staging
'.*app05-prep.*' = 'staging'
'.*arg03-prep.*' = 'staging:arg'
'.*shared01-prep.*' = 'staging:shared'

# [kubernetes.user_aliases]
# 'dev.local.cluster.k8s' = 'dev'
# 'root/.*' = 'root'

[nix_shell]
impure_msg = "[Ó©±](bold red)"
pure_msg = "[Œª](bold green)"
symbol = "Ôåì "
format = "[${symbol}](bold blue)"


#
# ---------- Languages -------------------------------------

[docker_context]
symbol = "Ôàü "
format = " [${symbol}(${context})]($style)"

[nodejs]
style = "bold green"
symbol = "Óúò "
format = " [${symbol}(${version})]($style)"

[ruby]
symbol = "Óûë "
format = " [${symbol}(${version})]($style)"

[rust]
symbol = "Óöã "
format = " [${symbol}(${version})]($style)"

[golang]
symbol = "Óôû "
