# This is a sample mpv.conf file. You may edit this file as you desire to change MPV's behavior. See the mpv.conf.md file for more info

# Big seekable demuxer cache — whichever limit hits first
# demuxer-max-bytes=2000M
# demuxer-readahead-secs=1200

# # Low-level network read buffer (don't go crazy; 500M is plenty)
# stream-buffer-size=500M

# # Optional: also cache backward seeks so scrubbing back doesn't flush
# demuxer-max-back-bytes=500M

# script-opts=stats-persistent_overlay=yes,stats-page=2
